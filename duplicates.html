<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Duplicate Tunes</title>
<style>
  body {
    font-family: sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #f0c060;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 32px;
    font-size: 14px;
  }
  .tune-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 40px;
    background: #2a2a2a;
    border-radius: 8px;
    padding: 16px;
  }
  .tune-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-size: 14px;
    font-weight: bold;
    color: #f0c060;
    min-width: 24px;
    align-self: center;
    white-space: nowrap;
  }
  .versions {
    display: flex;
    gap: 16px;
    flex: 1;
    flex-wrap: wrap;
  }
  .version {
    flex: 1;
    min-width: 300px;
    text-align: center;
  }
  .version-tag {
    display: inline-block;
    background: #444;
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 12px;
    margin-bottom: 8px;
    color: #ccc;
  }
  .version img {
    max-width: 100%;
    border: 1px solid #444;
    border-radius: 4px;
    background: #fff;
  }
</style>
</head>
<body>
<h1>Duplicate Tunes</h1>
<p class="subtitle">3 tunes with multiple versions</p>

<div class="tune-row">
  <div class="tune-label">Border Collie</div>
  <div class="versions">
    <div class="version">
      <div class="version-tag">new</div>
      <img src="Border Collie (new).png" alt="Border Collie (new)">
    </div>
    <div class="version">
      <div class="version-tag">old</div>
      <img src="Border Collie (old).png" alt="Border Collie (old)">
    </div>
  </div>
</div>
<div class="tune-row">
  <div class="tune-label">Cat in the Hopper</div>
  <div class="versions">
    <div class="version">
      <div class="version-tag">new</div>
      <img src="Cat in the Hopper (new).png" alt="Cat in the Hopper (new)">
    </div>
    <div class="version">
      <div class="version-tag">old</div>
      <img src="Cat in the Hopper (old).png" alt="Cat in the Hopper (old)">
    </div>
  </div>
</div>
<div class="tune-row">
  <div class="tune-label">Westphalia Waltz</div>
  <div class="versions">
    <div class="version">
      <div class="version-tag">new</div>
      <img src="Westphalia Waltz (new).png" alt="Westphalia Waltz (new)">
    </div>
    <div class="version">
      <div class="version-tag">old</div>
      <img src="Westphalia Waltz (old).png" alt="Westphalia Waltz (old)">
    </div>
  </div>
</div>
</body>
</html>
