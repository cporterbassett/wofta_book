<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Line Comparison</title>
<style>
  body { font-family: sans-serif; background: #2a2a2a; color: #eee; margin: 20px; }
  h1 { font-size: 1.2em; margin-bottom: 24px; color: #ccc; }
  .tune { margin-bottom: 40px; }
  h2 { font-size: 1em; margin-bottom: 8px; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 4px; }
  .pair { display: flex; gap: 12px; }
  .side { flex: 1; }
  .label { text-align: center; font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  img { width: 100%; border: 1px solid #555; background: white; }
</style>
</head>
<body>
<h1>Staff Line Reinforcement — Original vs. Cleaned</h1>

<div class="tune">
  <h2>Indian Point</h2>
  <div class="pair">
    <div class="side">
      <div class="label">Original</div>
      <img src="Indian Point.png">
    </div>
    <div class="side">
      <div class="label">Reinforced</div>
      <img src="Indian Point.staffed.png">
    </div>
  </div>
</div>

<div class="tune">
  <h2>Sarah Armstrong</h2>
  <div class="pair">
    <div class="side">
      <div class="label">Original</div>
      <img src="Sarah Armstrong.png">
    </div>
    <div class="side">
      <div class="label">Reinforced</div>
      <img src="Sarah Armstrong.staffed.png">
    </div>
  </div>
</div>

<div class="tune">
  <h2>Peekaboo Waltz</h2>
  <div class="pair">
    <div class="side">
      <div class="label">Original</div>
      <img src="Peekaboo Waltz.png">
    </div>
    <div class="side">
      <div class="label">Reinforced</div>
      <img src="Peekaboo Waltz.staffed.png">
    </div>
  </div>
</div>

</body>
</html>
